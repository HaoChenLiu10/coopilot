services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coopilot-backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coopilot-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
